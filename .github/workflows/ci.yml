name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: transpiler/package-lock.json

      - name: Install dependencies
        working-directory: transpiler
        run: npm ci

      - name: Run tests
        working-directory: transpiler
        run: npm test

  validate:
    name: Validate Skills
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: transpiler/package-lock.json

      - name: Install dependencies
        working-directory: transpiler
        run: npm ci

      - name: Build transpiler
        working-directory: transpiler
        run: npm run build

      - name: Validate all skills
        working-directory: transpiler
        run: npx tsx src/index.ts --validate

      - name: Audit skill enrichment
        working-directory: transpiler
        run: npx tsx src/index.ts --audit
