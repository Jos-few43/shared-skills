name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transpiler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: transpiler/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Validate transpilation (dry run)
        run: npx tsx src/index.ts --validate

  transpile:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transpiler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: transpiler/package-lock.json
      - run: npm ci
      - name: Full transpilation
        run: npx tsx src/index.ts
      - run: |
          echo "Transpiled skills:"
          ls -la ../dist/ | head -20
